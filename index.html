<!DOCTYPE html>
<html>
<head>
<title>mario's cinema</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
iframe {
  width: 90%;
  height: 90%;
  border: none;
}
</style>
</head>
<body>

<iframe id="player"></iframe>
  
<script>
let currentUrl = "";

async function loadVideo() {
  const res = await fetch("https://mariocrazyy.github.io/video.json?t=" + Date.now());
  const data = await res.json();

  if (data.url && data.url !== currentUrl) {
    currentUrl = data.url;
    document.getElementById("player").src = data.url;
    console.log("New video loaded");
  }
}

setInterval(loadVideo, 3000);
loadVideo();
</script>

</body>
</html>
