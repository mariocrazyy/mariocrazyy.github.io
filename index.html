<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .message {
      color: red;
      font-size: 28px;
      font-weight: bold;
      border: 2px dashed red;
      padding: 20px 30px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="message">Nothing here (in red)</div>

  <script>
    const text = "mario's web";
    let index = 0;
    let deleting = false;

    function animateTitle() {
      if (!deleting) {
        document.title = text.substring(0, index + 1);
        index++;

        if (index === text.length) {
          deleting = true;
          setTimeout(animateTitle, 800);
          return;
        }
      } else {
        document.title = text.substring(0, index - 1);
        index--;

        if (index === 0) {
          deleting = false;
        }
      }

      setTimeout(animateTitle, deleting ? 120 : 150);
    }

    animateTitle();
  </script>
</body>
</html>
