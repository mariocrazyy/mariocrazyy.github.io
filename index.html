<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario's Web</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .title {
      font-size: 48px;
      color: white;
      letter-spacing: 2px;
      border-right: 3px solid white;
      padding-right: 10px;
      white-space: nowrap;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div class="title" id="title"></div>

  <script>
    const text = "mario's web";
    const title = document.getElementById("title");

    let index = 0;
    let deleting = false;

    function animate() {
      if (!deleting) {
        title.textContent = text.substring(0, index + 1);
        index++;

        if (index === text.length) {
          deleting = true;
          setTimeout(animate, 1000);
          return;
        }
      } else {
        title.textContent = text.substring(0, index - 1);
        index--;

        if (index === 0) {
          deleting = false;
        }
      }

      setTimeout(animate, deleting ? 120 : 150);
    }

    animate();
  </script>
</body>
</html>
