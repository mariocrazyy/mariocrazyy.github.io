<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mario's net</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    font-family: Arial, sans-serif;
    color: #fff;
  }

  /* Animated Shooting Stars Background */
  #stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  
  .star {
    position: absolute;
    width: 2px;
    height: 60px;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.9));
    transform: rotate(45deg);
    transform-origin: center;
    animation: fall linear infinite;
    opacity: 0;
  }
  
  @keyframes fall {
    0% {
      transform: translate(0, 0) rotate(45deg);
      opacity: 0;
    }
    10% { opacity: 1; }
    85% { opacity: 1; }
    100% {
      transform: translate(-650px, 650px) rotate(45deg);
      opacity: 0;
    }
  }

  /* Main profile container */
  .box {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 30px;
    padding: 28px;
    border: 1px solid rgba(255,0,0,0.35);
    border-radius: 12px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    transform: scale(1.05);
  }

  /* LEFT PANEL COMPONENTS */
  .left { width: 280px; text-align: center; display: flex; flex-direction: column; }
  .pfp { width: 100px; height: 100px; border-radius: 50%; border: 2px solid red; margin: 0 auto; }
  h1 { font-size: 20px; margin: 12px 0 4px; color: red; }
  .tag { font-size: 13px; opacity: 0.7; margin: 0 0 4px; }

  .socials { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .socials a, .socials button {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 12px; color: #fff; text-decoration: none;
    border: 1px solid red; padding: 8px; border-radius: 6px;
    background: transparent; cursor: pointer; font-family: inherit;
    transition: background .15s, color .15s;
  }
  .socials a:hover, .socials button:hover { background: red; color: #000; }
  .socials a:hover img, .socials button:hover img { filter: invert(1); }
  .socials img { width: 14px; height: 14px; }

  /* 👾 Live Discord Status Component Widget */
  .discord-status-card {
    margin-top: 14px;
    border: 1px solid rgba(255,0,0,0.25);
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    padding: 10px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .discord-avatar-container { position: relative; width: 40px; height: 40px; }
  .discord-pfp { width: 100%; height: 100%; border-radius: 50%; background: #222; object-fit: cover; }
  .status-dot {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #000;
    background: #747f8d;
  }
  .status-dot.online { background: #23a55a; }
  .status-dot.idle { background: #f0b232; }
  .status-dot.dnd { background: #f23f43; }
  .status-dot.offline { background: #747f8d; }

  .discord-info { display: flex; flex-direction: column; overflow: hidden; }
  .discord-name { font-size: 13px; font-weight: 700; color: #fff; }
  .discord-activity { font-size: 11px; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

  /* RIGHT PANEL COMPONENTS */
  .right { width: 580px; display: flex; flex-direction: column; gap: 12px; }

  .panel {
    border: 1px solid rgba(255,0,0,0.3);
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    padding: 12px;
  }
  .panel h3 {
    margin: 0 0 10px; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: red;
  }

  /* Language parsing visualization bar */
  .lang-bar { display: flex; height: 8px; width: 100%; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.1); }
  .lang-legend { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px 12px; font-size: 11px; color: rgba(255,255,255,0.85); }
  .lang-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* Repos layout rendering architecture */
  .repos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 240px; overflow-y: auto; padding-right: 4px; }
  .repos::-webkit-scrollbar { width: 6px; }
  .repos::-webkit-scrollbar-thumb { background: rgba(255,0,0,0.4); border-radius: 3px; }
  
  .repo {
    border: 1px solid rgba(255,0,0,0.2);
    border-radius: 6px; padding: 8px 10px;
    transition: border-color .15s, background-color .15s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
  }
  .repo:hover { 
    border-color: rgba(255,0,0,0.7); 
    background-color: rgba(255, 0, 0, 0.05);
  }
  .repo:hover a { color: red; }
  
  .repo-title-container { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .repo a { color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  .repo .archive-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background-color: #eab308; flex-shrink: 0; }

  .archive-badge {
    display: inline-block;
    align-self: flex-start;
    font-size: 9px;
    font-weight: 600;
    color: #eab308;
    border: 1px solid rgba(234, 179, 8, 0.4);
    background: rgba(234, 179, 8, 0.1);
    padding: 1px 5px;
    border-radius: 4px;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .repo .meta { margin-top: 6px; font-size: 11px; color: rgba(255,255,255,0.55); display: flex; gap: 10px; align-items: center; }
  .repo .lang-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  .right .bottom { display: flex; justify-content: flex-end; }
  .repos-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: #fff; text-decoration: none;
    border: 1px solid red; padding: 8px 12px; border-radius: 6px;
    background: transparent; cursor: pointer; font-family: inherit;
  }
  .repos-btn:hover { background: red; color: #000; }
  .repos-btn:hover img { filter: invert(1); }
  .repos-btn img { width: 14px; height: 14px; }

  .muted { font-size: 11px; color: rgba(255,255,255,0.5); grid-column: span 2; }

  /* Repository Modal Stylesheet layer */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: none; align-items: center; justify-content: center; z-index: 10;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: min(720px, 92vw); max-height: 80vh; overflow: hidden;
    background: #000; border: 1px solid rgba(255,0,0,0.5); border-radius: 12px;
    padding: 16px; display: flex; flex-direction: column;
  }
  .modal header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .modal h2 { margin: 0; color: red; font-size: 16px; }
  .modal .close {
    background: transparent; border: 1px solid red; color: #fff;
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .modal .close:hover { background: red; color: #000; }
  
  .modal .list { 
    overflow-y: auto; 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
    gap: 8px; 
    padding-right: 4px; 
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="box">
  <div class="left">
    <img class="pfp" src="https://github.com/mariocrazyy.png" alt="mario_crazyy" />
    <h1>mario_crazyy</h1>
    <p class="tag">welcome to my net</p>

    <div class="socials">
      <a href="https://github.com/mariocrazyy" target="_blank" rel="noopener">
        <img src="https://cdn.simpleicons.org/github/ffffff" alt="" /> GitHub
      </a>
      <a href="https://steamcommunity.com/id/mario_crazyy/" target="_blank" rel="noopener">
        <img src="https://cdn.simpleicons.org/steam/ffffff" alt="" /> Steam
      </a>
      <button id="discordBtn">
        <img src="https://cdn.simpleicons.org/discord/ffffff" alt="" /> Discord
      </button>
      <a href="https://open.spotify.com/user/31rwreyhawc6lavftsuqqwkd6pd4" target="_blank" rel="noopener">
        <img src="https://cdn.simpleicons.org/spotify/ffffff" alt="" /> Spotify
      </a>
    </div>

    <div class="discord-status-card">
      <div class="discord-avatar-container">
        <img id="discordPfp" class="discord-pfp" src="https://github.com/mariocrazyy.png" alt="" />
        <div id="discordStatusDot" class="status-dot offline"></div>
      </div>
      <div class="discord-info">
        <span id="discordUsername" class="discord-name">mario_crazyy</span>
        <span id="discordActivity" class="discord-activity">Connecting status protocol...</span>
      </div>
    </div>

  </div>

  <div class="right">
    <div class="panel">
      <h3>Most used languages</h3>
      <div id="langContent"><p class="muted">Parsing language data...</p></div>
    </div>

    <div class="panel" style="flex:1; min-height:0; display:flex; flex-direction:column;">
      <h3>Recent repos</h3>
      <div class="repos" id="reposShort"><p class="muted">Scanning repositories...</p></div>
    </div>

    <div class="bottom">
      <button class="repos-btn" id="openReposBtn">
        <img src="https://cdn.simpleicons.org/github/ffffff" alt="" /> GitHub Repos
      </button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <header>
      <h2>mariocrazyy's repositories</h2>
      <button class="close" id="closeModal">×</button>
    </header>
    <div class="list" id="reposAll"><p class="muted">Parsing database entry modules...</p></div>
  </div>
</div>

<script>
  /* ⭐ Star field background rendering initialization engine */
  (function initStars(){
    try {
      const root = document.getElementById('stars');
      if(!root) return;
      const N = 85; 
      for (let i = 0; i < N; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        
        const left = Math.random() * 150 - 20;      
        const top = Math.random() * 140 - 40;       
        
        const duration = 4 + Math.random() * 5;     
        const delay = Math.random() * -10; 
        const length = 40 + Math.random() * 50;     
        
        s.style.left = left + 'vw';
        s.style.top = top + 'vh';
        s.style.height = length + 'px';
        s.style.animationDuration = duration + 's';
        s.style.animationDelay = delay + 's';
        s.style.opacity = (0.3 + Math.random() * 0.7).toFixed(2);
        root.appendChild(s);
      }
    } catch(err) {
      console.log("Star generation runtime failure bypassed.");
    }
  })();

  /* Discord Handle User Clipboard Copy Interface Action */
  document.getElementById('discordBtn').addEventListener('click', function() {
    const textToCopy = 'marioo.crazy';
    navigator.clipboard.writeText(textToCopy).then(() => {
      const originalContent = this.innerHTML;
      this.innerHTML = 'Copied!';
      setTimeout(() => { this.innerHTML = originalContent; }, 1500);
    }).catch(err => {
      console.error('Failed to copy handle text: ', err);
    });
  });

  /* Live Lanyard Sync Engine Wrapper Profile Settings */
  const DISCORD_ID = '715560942635909202';
  
  async function updateDiscordStatus() {
    try {
      const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      if (!response.ok) throw new Error('Network status payload rejected');
      const json = await response.json();
      if (!json.success || !json.data) return;
      
      const data = json.data;
      const usernameEl = document.getElementById('discordUsername');
      const activityEl = document.getElementById('discordActivity');
      const statusDot = document.getElementById('discordStatusDot');
      
      if (data.discord_user) {
        usernameEl.textContent = "mario_crazyy";
        if (data.discord_user.avatar) {
          document.getElementById('discordPfp').src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.png`;
        }
      }
      
      const currentStatus = data.discord_status || 'offline';
      statusDot.className = `status-dot ${currentStatus}`;
      
      if (currentStatus === 'offline') {
        activityEl.textContent = 'User currently offline';
        return;
      }

      // Priority Match 1: Extract Spotify metadata payload values explicitly
      if (data.listening_to_spotify && data.spotify) {
        const track = data.spotify.song || 'Music track';
        const artist = data.spotify.artist ? data.spotify.artist.split(';')[0] : 'Unknown Artist';
        activityEl.textContent = `Listening to ${track} - ${artist}`;
        return;
      }
      
      // Priority Match 2: Client standard active custom activity or game rich presences
      if (data.activities && data.activities.length > 0) {
        const customStatus = data.activities.find(act => act.type === 4);
        const gameStatus = data.activities.find(act => act.type === 0 || act.type === 2);
        
        if (customStatus && customStatus.state) {
          activityEl.textContent = customStatus.state;
        } else if (gameStatus && gameStatus.name) {
          activityEl.textContent = `Playing ${gameStatus.name}`;
        } else {
          activityEl.textContent = 'currently not doing anything';
        }
      } else {
        activityEl.textContent = 'currently not doing anything';
      }
    } catch (err) {
      document.getElementById('discordActivity').textContent = 'Presence data sync muted';
    }
  }

  /* GitHub REST Engine Component Parameters */
  const GH_USER = 'mariocrazyy';
  const LANG_COLORS = {
    JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5',
    HTML:'#e34c26', CSS:'#563d7c', Java:'#b07219', 'C++':'#f34b7d',
    Lua:'#000080', Shell:'#89e051', Rust:'#dea584', Go:'#00ADD8'
  };
  const langColor = n => LANG_COLORS[n] || '#ef4444';

  async function fetchRepos() {
    const res = await fetch(`https://api.github.com/users/${GH_USER}/repos?per_page=100&sort=updated`);
    if (!res.ok) throw new Error('GitHub API structure rejected ' + res.status);
    const data = await res.json();
    return data.filter(repo => {
      const name = repo.name.toLowerCase();
      return name !== 'mariocrazyy.github.io' && name !== 'mariocrazyy';
    });
  }

  async function fetchLanguages(repos) {
    const own = repos.filter(r => !r.fork).slice(0, 3); // Rate limits strict validation fallback protection configuration
    const totals = {};
    await Promise.all(own.map(async r => {
      try {
        const res = await fetch(r.languages_url);
        if (!res.ok) return;
        const data = await res.json();
        for (const [k,v] of Object.entries(data)) totals[k] = (totals[k]||0) + v;
      } catch {}
    }));
    return totals;
  }

  function renderLanguages(totals) {
    const el = document.getElementById('langContent');
    const total = Object.values(totals).reduce((a,b)=>a+b, 0);
    if (!total) { el.innerHTML = '<p class="muted">No data entries mapped.</p>'; return; }
    const top = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,6)
      .map(([n,b]) => ({ name:n, pct: (b/total)*100 }));
    el.innerHTML = `
      <div class="lang-bar">
        ${top.map(l => `<div title="${l.name} ${l.pct.toFixed(1)}%" style="width:${l.pct}%;background:${langColor(l.name)}"></div>`).join('')}
      </div>
      <div class="lang-legend">
        ${top.map(l => `<span><span class="dot" style="background:${langColor(l.name)}"></span>${l.name} <span style="opacity:.6">${l.pct.toFixed(1)}%</span></span>`).join('')}
      </div>
    `;
  }

  function repoCard(r) {
    return `
      <div class="repo" onclick="window.open('${r.html_url}', '_blank')">
        <div>
          <div class="repo-title-container">
            ${r.archived ? `<span class="archive-dot" title="Archived"></span>` : ''}
            <a href="${r.html_url}" target="_blank" rel="noopener" title="${r.name}">${r.name}</a>
          </div>
          ${r.archived ? `<div class="archive-badge">Public Archive</div>` : ''}
        </div>
        <div class="meta">
          ${r.language ? `<span><span class="lang-dot" style="background:${langColor(r.language)}"></span>${r.language}</span>` : ''}
          <span>★ ${r.stargazers_count}</span>
          <span>${new Date(r.updated_at).toLocaleDateString()}</span>
        </div>
      </div>
    `;
  }

  // Modal display configuration logic routines
  const modal = document.getElementById('modal');
  document.getElementById('openReposBtn').addEventListener('click', () => modal.classList.add('open'));
  document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  /* Run isolated execution threads asynchronously */
  // Pipeline Segment 1: Connect Lanyard loop instantly
  updateDiscordStatus();
  setInterval(updateDiscordStatus, 8000);

  // Pipeline Segment 2: Connect GitHub infrastructure async context blocks
  (async function initGitHubLayout() {
    try {
      const repos = await fetchRepos();
      document.getElementById('reposShort').innerHTML = repos.slice(0,6).map(repoCard).join('');
      document.getElementById('reposAll').innerHTML = repos.map(repoCard).join('');
      const totals = await fetchLanguages(repos);
      renderLanguages(totals);
    } catch (e) {
      document.getElementById('langContent').innerHTML = '<p class="muted">GitHub module connection fallback activated.</p>';
      document.getElementById('reposShort').innerHTML = '<p class="muted">Repositories database tracking restricted.</p>';
    }
  })();
</script>
</body>
</html>
