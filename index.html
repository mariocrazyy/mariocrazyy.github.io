<!DOCTYPE html>
<html>
<head>
<title>mario's cinema</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
iframe {
  width: 90%;
  height: 90%;
  border: none;
}
</style>
</head>
<body>

<iframe id="player"></iframe>

<script>
async function loadVideo() {
  try {
    const res = await fetch("https://mariocrazyy.github.io/video.json");
    const data = await res.json();

    if (data.url) {
      document.getElementById("player").src = data.url;
    }
  } catch(e) {
    console.log("error loading video");
  }
}

// refresh every 2 seconds
setInterval(loadVideo, 2000);
loadVideo();
</script>

</body>
</html>
