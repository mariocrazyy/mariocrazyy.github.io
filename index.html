<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mario's cinema</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
  #status { margin-bottom:10px; font-size:1.2em; }
  iframe { width:80%; height:80%; border:none; }
</style>
</head>
<body>
<div id="status">pls wait for host</div>
<iframe id="player" src="" allowfullscreen></iframe>

<script>
const ws = new WebSocket("ws://192.168.1.8:8765"); // replace YOUR_HOST_IP with your PC's IP running host_gui.py
const player = document.getElementById("player");
const status = document.getElementById("status");

let currentUrl = "";
let lastAction = "";

ws.onopen = () => {
    status.textContent = "Connected to host.";
};

ws.onmessage = (msg) => {
    try {
        const data = JSON.parse(msg.data);
        if(data.url && data.url !== currentUrl){
            currentUrl = data.url;
            player.src = currentUrl;
            status.textContent = "Host set the video. Loading...";
        }

        if(data.action !== lastAction){
            lastAction = data.action;
            handleAction(data);
        }
    } catch(e){
        console.error(e);
    }
};

function handleAction(data){
    if(!player.src) return;
    switch(data.action){
        case "play":
            status.textContent = "Playing";
            postMessageToIframe("play");
            break;
        case "pause":
            status.textContent = "Paused";
            postMessageToIframe("pause");
            break;
        case "seek":
            status.textContent = "Seeking to " + data.time + "s";
            postMessageToIframe("seek", data.time);
            break;
        case "wait":
            status.textContent = "Please wait for the host...";
            break;
    }
}

// Since we cannot control VidKing iframe directly due to cross-origin, viewers manually follow instructions.
function postMessageToIframe(action, time){
    console.log("Action:", action, time || "");
    // Here you can optionally overlay instructions
}
</script>
</body>
</html>
