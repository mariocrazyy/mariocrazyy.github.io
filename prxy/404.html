<!DOCTYPE html>
<html>
<head>
    <title>prxy</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #0d0d0d; color: #0f0; }
        input, button { padding: 10px; font-size: 16px; background: #1a1a1a; color: #0f0; border: 1px solid #0f0; }
        iframe { width: 100%; height: 70vh; border: 1px solid #0f0; margin-top: 10px; background: white; }
    </style>
</head>
<body>
    <h2>prxy - proxy by mario_crazyy</h2>
    <input type="text" id="url" placeholder="https://example.com" size="60">
    <button onclick="go()">Go</button>
    <iframe id="frame"></iframe>
    <script>
        function go() {
            let target = document.getElementById('url').value;
            if (!target.startsWith('http')) target = 'https://' + target;
            let proxy = 'https://corsproxy.io/?' + encodeURIComponent(target);
            document.getElementById('frame').src = proxy;
        }
    </script>
</body>
</html>
